<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;family=IBM+Plex+Sans:wght@500&amp;display=swap" rel="stylesheet"/>

            darkMode: "class",

                extend: {

                        "on-secondary-fixed-variant": "#004c69",
                        "primary-fixed": "#e6deff",
                        "background": "#131313",
                        "tertiary-fixed-dim": "#98da27",
                        "primary": "#cabeff",
                        "tertiary-container": "#6ba000",
                        "secondary-fixed": "#c4e7ff",
                        "on-surface": "#e5e2e1",
                        "on-secondary-container": "#00374d",
                        "on-primary-fixed": "#1c0062",
                        "tertiary": "#98da27",
                        "on-secondary": "#00354a",
                        "on-error-container": "#ffdad6",
                        "outline": "#938ea1",
                        "secondary": "#7bd0ff",
                        "surface": "#131313"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",

                    },
                    "spacing": {
                        "xs": "4px",
                        "md": "24px",
                        "xl": "64px",
                        "gutter": "16px",
                        "lg": "40px",
                        "base": "8px",
                        "container-margin": "20px",
                        "sm": "12px",
                        "stack-sm": "0.5rem",
                        "stack-lg": "1.5rem",
                        "stack-md": "1rem",
                        "safe-area-bottom": "2rem"
                    },
                    "fontFamily": {
                        "display-lg": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "label-md": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "headline-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]

                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
        }
        .glass-card {
            background: rgba(32, 31, 31, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(147, 142, 161, 0.1);
        }
    </style>
</head>
<body class="bg-background text-on-background antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl h-16 w-full max-w-md mx-auto left-0 right-0 flex justify-between items-center px-container-margin border-b border-white/5">
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
<h1 class="font-display-lg text-headline-md text-primary tracking-tight">Prosper</h1>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden active:scale-95 duration-200 hover:opacity-80 transition-opacity ring-1 ring-white/10">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCd4MCoYF74BHaJjEwbsAMijbZRs5l1Z_ui8J3qOAcFFsdL9JtQ4eCHGcz3pIz5vsSjTF_dbDOjeE5boSHzcH5RGELqZMb-O20zROWgmKxiFWj8D_wXJuXDrB8ViUJ7V1c-vL9gw0FBYtvp1t39NtoXRgZGEFb_G9Rw0ezQ76P7ZeW9gDpdig2JEKJOwYUPe9iBnJJaMt3UvGqAvhB4nNQSUvKhZ7P7KXblMzzVcQuQT0dijyV1MhNaH98afkhCiV9A_t2mpDBxcwV4"/>
</div>
</header>
<main class="pt-24 pb-safe-area-bottom px-container-margin max-w-md mx-auto min-h-screen flex flex-col">
<!-- Header Text -->
<section class="mb-stack-lg">
<h2 class="font-display-lg text-headline-lg text-on-surface mb-2">New Entry</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Select the type of transaction you would like to record.</p>
</section>
<!-- Transaction Type Cards -->
<div class="grid grid-cols-1 gap-4">
<!-- Expense Card -->
<button class="glass-card group relative flex items-center p-stack-lg rounded-xl active:scale-[0.98] transition-all duration-200 text-left overflow-hidden">
<div class="absolute inset-0 bg-error/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-14 h-14 rounded-xl bg-error/20 flex items-center justify-center mr-stack-md group-hover:scale-110 transition-transform ring-1 ring-error/30">
<span class="material-symbols-outlined text-error text-[32px]">outbound</span>
</div>
<div class="flex-1 z-10">
<div class="flex items-center justify-between">
<span class="font-headline-md text-headline-md text-on-surface">Expense</span>
<span class="material-symbols-outlined text-error/50 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant/80">Spending, bills, and purchases</p>
</div>
</button>
<!-- Income Card -->
<button class="glass-card group relative flex items-center p-stack-lg rounded-xl active:scale-[0.98] transition-all duration-200 text-left overflow-hidden">
<div class="absolute inset-0 bg-tertiary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-14 h-14 rounded-xl bg-tertiary/20 flex items-center justify-center mr-stack-md group-hover:scale-110 transition-transform ring-1 ring-tertiary/30">
<span class="material-symbols-outlined text-tertiary text-[32px]">account_balance_wallet</span>
</div>
<div class="flex-1 z-10">
<div class="flex items-center justify-between">
<span class="font-headline-md text-headline-md text-on-surface">Income</span>
<span class="material-symbols-outlined text-tertiary/50 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant/80">Salary, dividends, and gifts</p>
</div>
</button>
<!-- Transfer Card -->
<button class="glass-card group relative flex items-center p-stack-lg rounded-xl active:scale-[0.98] transition-all duration-200 text-left overflow-hidden">
<div class="absolute inset-0 bg-secondary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-14 h-14 rounded-xl bg-secondary/20 flex items-center justify-center mr-stack-md group-hover:scale-110 transition-transform ring-1 ring-secondary/30">
<span class="material-symbols-outlined text-secondary text-[32px]">sync_alt</span>
</div>
<div class="flex-1 z-10">
<div class="flex items-center justify-between">
<span class="font-headline-md text-headline-md text-on-surface">Transfer</span>
<span class="material-symbols-outlined text-secondary/50 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant/80">Between your own accounts</p>
</div>
</button>
</div>
<!-- Decorative Illustration Section -->
<div class="mt-auto pt-stack-lg flex flex-col items-center opacity-40">
<div class="w-full aspect-square max-w-[200px] mb-stack-md filter grayscale brightness-125 contrast-125">
<img alt="Financial Planning Illustration" class="w-full h-full mix-blend-lighten" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7BJLtCcCGye7wmrWDAnUcoiGBuLKmwbWd-9ztWP3mnwrEAxbKKXB2FYqZNEUSkcBQuRCcZ_N6c2jGbbtVAM4QrDhHl5kdOL2cfcmji5M4kkj9EzbU7eq8x9tXxU9es0swRzqrbyxt5l678M4V3gcsNFfSB6r9KixeanOZyhSGykdfwwOAQ6t0_LzXFykvmNGzSOzqaSBllumWLJV_Bo7XqKdBXdz__UwOgXgiURHq4kN1A0zRvjr_Cf9W49V6ALuKreWHulgPf1YY"/>
</div>
</div>
<!-- Secondary Action -->
<div class="mt-8 mb-6">
<button class="w-full py-4 bg-surface-container-low border border-white/5 rounded-xl font-label-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-all active:scale-95 duration-150">
            Cancel and return to Ledger
        </button>
</div>
</main>
</body></html>
