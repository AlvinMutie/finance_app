<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "on-tertiary-container": "#1c2f00",
                "on-tertiary": "#213600",
                "secondary-container": "#00a6e0",
                "outline-variant": "#484555",
                "on-primary-container": "#2a0088",
                "on-secondary-fixed": "#001e2c",
                "surface-dim": "#131313",
                "surface-container-highest": "#353534",
                "surface-container-high": "#2a2a2a",
                "inverse-primary": "#603ce2",
                "on-primary": "#31009a",
                "surface-container": "#201f1f",
                "error": "#ffb4ab",
                "tertiary-fixed": "#b2f746",
                "surface-container-lowest": "#0e0e0e",
                "on-primary-fixed-variant": "#4816cb",
                "on-error": "#690005",
                "surface-container-low": "#1c1b1b",
                "inverse-on-surface": "#313030",
                "on-tertiary-fixed-variant": "#334f00",
                "primary-container": "#947dff",
                "error-container": "#93000a",
                "primary-fixed-dim": "#cabeff",
                "on-background": "#e5e2e1",
                "surface-variant": "#353534",
                "on-surface-variant": "#c9c4d8",
                "surface-bright": "#3a3939",
                "secondary-fixed-dim": "#7bd0ff",
                "surface-tint": "#cabeff",
                "inverse-surface": "#e5e2e1",
                "on-tertiary-fixed": "#121f00",
                "on-secondary-fixed-variant": "#004c69",
                "primary-fixed": "#e6deff",
                "background": "#131313",
                "tertiary-fixed-dim": "#98da27",
                "primary": "#cabeff",
                "tertiary-container": "#6ba000",
                "secondary-fixed": "#c4e7ff",
                "on-surface": "#e5e2e1",
                "on-secondary-container": "#00374d",
                "on-primary-fixed": "#1c0062",
                "tertiary": "#98da27",
                "on-secondary": "#00354a",
                "on-error-container": "#ffdad6",
                "outline": "#938ea1",
                "secondary": "#7bd0ff",
                "surface": "#131313"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "xs": "4px",
                "md": "24px",
                "xl": "64px",
                "gutter": "16px",
                "lg": "40px",
                "base": "8px",
                "container-margin": "20px",
                "sm": "12px",
                "stack-sm": "0.5rem",
                "stack-md": "1rem",
                "stack-lg": "1.5rem",
                "safe-area-bottom": "2rem"
        },
        "fontFamily": {
                "display-lg": ["Manrope"],
                "body-lg": ["Manrope"],
                "body-md": ["Manrope"],
                "headline-lg-mobile": ["Manrope"],
                "label-md": ["Manrope"],
                "headline-md": ["Manrope"],
                "headline-lg": ["Manrope"],
                "label-sm": ["Inter"]
        },
        "fontSize": {
                "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "500"}],
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}]
        }
      },
    },
  }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { min-height: max(884px, 100dvh); }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-white/5">
<div class="flex justify-between items-center px-container-margin h-16 w-full max-w-md mx-auto">
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary">New Transaction</h1>
<div class="w-6"></div>
</div>
</header>
<main class="flex-1 w-full max-w-md mx-auto px-container-margin pt-24 pb-safe-area-bottom">
<!-- Amount Input Section -->
<div class="flex flex-col items-center mb-stack-lg animate-in fade-in slide-in-from-top-4 duration-700">
<span class="font-label-md text-label-md text-on-surface-variant mb-stack-sm uppercase tracking-widest">Amount</span>
<div class="flex items-baseline group">
<span class="font-display-lg text-display-lg text-primary/50 mr-2">$</span>
<input autofocus="" class="w-full bg-transparent border-none text-center focus:ring-0 font-display-lg text-display-lg text-primary placeholder-outline-variant p-0" placeholder="0.00" step="0.01" type="number"/>
</div>
<div class="h-1 w-24 bg-primary/20 mt-4 rounded-full"></div>
</div>
<!-- Form Container -->
<div class="space-y-stack-lg">
<!-- Category Picker -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-1">Category</label>
<div class="flex gap-3 overflow-x-auto hide-scrollbar py-1">
<!-- Food -->
<button class="flex flex-col items-center justify-center min-w-[76px] h-[92px] rounded-2xl bg-surface-container-high border-2 border-tertiary shadow-lg active:scale-95 transition-all">
<div class="w-11 h-11 rounded-full bg-tertiary flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-on-tertiary text-2xl">restaurant</span>
</div>
<span class="font-label-md text-label-md text-on-surface">Food</span>
</button>
<!-- Transport -->
<button class="flex flex-col items-center justify-center min-w-[76px] h-[92px] rounded-2xl bg-surface-container border border-white/5 active:scale-95 transition-all">
<div class="w-11 h-11 rounded-full bg-surface-container-highest flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-on-surface-variant">directions_car</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Transport</span>
</button>
<!-- Rent -->
<button class="flex flex-col items-center justify-center min-w-[76px] h-[92px] rounded-2xl bg-surface-container border border-white/5 active:scale-95 transition-all">
<div class="w-11 h-11 rounded-full bg-surface-container-highest flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-on-surface-variant">home</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Rent</span>
</button>
<!-- Shopping -->
<button class="flex flex-col items-center justify-center min-w-[76px] h-[92px] rounded-2xl bg-surface-container border border-white/5 active:scale-95 transition-all">
<div class="w-11 h-11 rounded-full bg-surface-container-highest flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-on-surface-variant">shopping_bag</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Shopping</span>
</button>
</div>
</div>
<!-- Date Picker -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-1">Date</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary">calendar_today</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border-2 border-white/5 rounded-2xl font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-0 transition-all" type="date" value="2023-10-27"/>
</div>
</div>
<!-- Note Field -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-1">Note (Optional)</label>
<div class="relative">
<div class="absolute top-4 left-4 flex items-start pointer-events-none">
<span class="material-symbols-outlined text-primary">notes</span>
</div>
<textarea class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-2 border-white/5 rounded-2xl font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-0 transition-all resize-none" placeholder="What was this for?" rows="3"></textarea>
</div>
</div>
<!-- Transaction Detail Image -->
<div class="pt-2">
<div class="w-full h-44 rounded-3xl overflow-hidden relative group cursor-pointer shadow-xl border-2 border-white/5">
<img class="w-full h-full object-cover grayscale opacity-80 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-500" data-alt="Receipt preview" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBTh1wH-DePAAYxizZqtRG2KD0MB9lMvJ9g3PTjqPnYI3ndArCzRRRCDbhSMbfD6Et9nrOKXiNLOfD6LjhpxWDlAEYAdqTLUgqbje-ed49acXXqDztVR327PR-eHLfbWR9IGwiSIyXkNxpovtuS0QJCqx9a5dTWeEr4EqhIed63tqWHjAZM_dDLlyEYc1wANFwsm4--pCl1YI9Ey5wle409WderxfxOLekx-ZmXtGTFXAlri7Lm5hTJJDlOw0n2RsOvACHQfVZcWRPV"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
<div class="absolute bottom-4 left-4 right-4 flex justify-between items-center">
<span class="px-3 py-1.5 bg-primary/20 backdrop-blur-md text-primary font-label-md text-label-md rounded-lg border border-primary/30">Receipt Attached</span>
<div class="w-10 h-10 bg-primary/20 backdrop-blur-md rounded-full flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary">add_a_photo</span>
</div>
</div>
</div>
</div>
<!-- Save Button -->
<div class="pt-stack-lg">
<button class="w-full h-16 bg-primary text-on-primary rounded-2xl font-headline-lg text-headline-lg active:scale-[0.97] transition-all flex items-center justify-center gap-2 shadow-2xl shadow-primary/30 uppercase tracking-wider">
                    Save Transaction
                </button>
</div>
</div>
</main>
<div class="h-safe-area-bottom"></div>
</body></html>
